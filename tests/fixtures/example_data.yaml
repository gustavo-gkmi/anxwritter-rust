# data.yaml — Chart data for Operation Northstar (fictional sample).
#
# Pairs with config.yaml. Build with:
#
#   anxwritter --config config.yaml data.yaml -o investigation.anx
#
# All persons, companies, phone numbers, and balances are invented.
# US phones use the (555) 0100–0199 fictional range.

